<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="MERIDIAN — product detail. Try it on instantly with the PEAR Camera." />
  <title>MERIDIAN — Product</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
    rel="stylesheet"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ░░ HEADER ░░ -->
  <header class="header" id="header">
    <div class="header__inner wrap">
      <a class="brand" href="index.html" aria-label="MERIDIAN home">
        <span class="brand__name">MERIDIAN</span><span class="brand__reg">®</span>
      </a>
      <nav class="nav" aria-label="Categories">
        <a href="index.html#home">Home</a>
        <a href="index.html#shirts">Shirts</a>
        <a href="index.html#pants">Pants</a>
        <a href="index.html#new">New Arrivals</a>
      </nav>
      <div class="header__actions">
        <button class="bag" id="bagBtn" aria-label="Shopping bag">
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor" stroke-width="1.6">
            <path d="M6 8h12l-1 12.5H7L6 8Z" stroke-linejoin="round" />
            <path d="M9 8V6.5a3 3 0 0 1 6 0V8" />
          </svg>
          <span class="bag__count" id="bagCount">0</span>
        </button>
      </div>
    </div>
  </header>

  <!-- ░░ PRODUCT DETAIL ░░ -->
  <main class="pdp" id="pdp">
    <div class="wrap">
      <nav class="pdp__crumbs" id="crumbs" aria-label="Breadcrumb">
        <a href="index.html#home">Home</a>
      </nav>

      <div class="pdp__grid" id="pdpGrid">
        <!-- product.js renders here -->
      </div>
    </div>
  </main>

  <!-- Toast -->
  <div class="toast" id="toast" role="status" aria-live="polite"></div>

  <script src="catalog.js" defer></script>
  <script src="product.js" defer></script>
</body>
</html>
