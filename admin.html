<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, nofollow">
  <title>PEAR · Admin Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Urbanist:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="admin.css?v=10">
</head>
<body>

  <!-- ░░ DATA DASHBOARD VIEW (open access — loads directly, no login) ░░ -->
  <main id="dashboardView" class="admin-dash dashboard-view">
    <header class="dash-top">
      <div class="dash-top__brand">
        <span class="dash-top__mark">PEAR</span>
        <span class="dash-top__title">Session Analytics</span>
      </div>
      <div class="dash-top__actions">
        <button id="refreshBtn" class="dash-btn dash-btn--ghost" type="button">Refresh</button>
        <button id="clearBtn"   class="dash-btn dash-btn--ghost" type="button">Clear all</button>
      </div>
    </header>

    <section class="dash-stats">
      <div class="stat-card">
        <span class="stat-card__num" id="statTotal">0</span>
        <span class="stat-card__label">Total Sessions</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__num" id="statVisitors">0</span>
        <span class="stat-card__label">Unique Visitors</span>
      </div>
      <div class="stat-card">
        <span class="stat-card__num" id="statGarments">0</span>
        <span class="stat-card__label">Garments Sized</span>
      </div>
    </section>

    <!-- ░░ INSIGHTS — size distribution grouped by garment ░░ -->
    <section class="dash-insights">
      <h2 class="dash-section-title">Insights · Size Distribution by Garment</h2>
      <div id="insightsGrid" class="insights-grid">
        <!-- garment insight cards injected by admin.js -->
      </div>
      <p id="insightsEmpty" class="dash-empty" hidden>No garment data yet.</p>
    </section>

    <section class="dash-table-wrap">
      <table class="dash-table">
        <thead>
          <tr>
            <th>Anonymized ID</th>
            <th>Recommended Size</th>
            <th>Height</th>
            <th>Weight</th>
            <th>Chest</th>
            <th>Waist</th>
            <th>Garment</th>
            <th>Timestamp</th>
          </tr>
        </thead>
        <tbody id="sessionRows">
          <!-- rows injected by admin.js -->
        </tbody>
      </table>
      <p id="emptyState" class="dash-empty" hidden>No sessions logged yet.</p>
      <p id="dashError"  class="dash-error" role="alert" hidden></p>
    </section>
  </main>

  <script src="admin.js?v=11"></script>
</body>
</html>
